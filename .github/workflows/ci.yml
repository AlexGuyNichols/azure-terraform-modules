name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# T-03-02: Least-privilege token — read-only contents scope.
permissions:
  contents: read

jobs:
  # D-11: Sanitise job gates everything — all other jobs declare needs: sanitise.
  sanitise:
    name: Sanitise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Write private patterns from secret
        # D-06: CI writes the secret to the one well-known gitignored path.
        # T-03-01: printf prevents a trailing newline from creating a stray blank pattern.
        # GitHub Actions automatically masks secret values in logs.
        # Never echo/cat the file after writing — masks only suppress known secret strings.
        # CR-01: the secret is passed via env, NEVER inlined with ${{ }} into the
        # script text — inline expansion happens before bash parses the script, so
        # regex metacharacters (quotes, $(, backticks) in a pattern could break out
        # of the quoted string and leak fragments past the log mask. As an env var,
        # printf treats it as an opaque argument and no shell parsing ever occurs.
        env:
          SANITISE_PATTERNS: ${{ secrets.SANITISE_PATTERNS }}
        run: printf '%s\n' "$SANITISE_PATTERNS" > scripts/.private-patterns

      - name: Sweep self-test
        # Prove the gate's own behaviour is correct on every run.
        run: bash tests/test_sanitise.sh

      - name: Run sanitisation sweep
        run: bash scripts/sanitise.sh

  # WR-05 (phase 2 review): run the per-module security gates in CI — they are
  # the authoritative enforcement of hardening claims and document skip rationales.
  # Phase 2: 22-assertion key-vault gate. Phase 3: 28-assertion storage-account gate.
  module-gate:
    name: Module gates
    runs-on: ubuntu-latest
    # D-11: Every non-sanitise job must gate on sanitise.
    needs: sanitise
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.15.5"
          # The gate scripts invoke terraform inside bash command substitution
          # (fmt assertion); the node wrapper would pollute the captured output.
          terraform_wrapper: false

      - name: Install checkov
        # Pinned to the version the gate's assertions were verified against locally.
        run: python3 -m pip install checkov==3.3.1

      - name: Run key vault module gate
        run: bash tests/test_key_vault_module.sh

      - name: Run storage account module gate
        run: bash tests/test_storage_account_module.sh

  # D-09: Dynamic matrix discovery — new modules join CI with zero workflow edits.
  discover:
    name: Discover modules
    runs-on: ubuntu-latest
    needs: sanitise
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - id: set-matrix
        name: Build directory matrix
        run: |
          dirs=$(
            {
              find modules -mindepth 1 -maxdepth 1 -type d 2>/dev/null || true
              find examples -mindepth 2 -maxdepth 2 -type d 2>/dev/null || true
            } | sort | jq -R . | jq -sc .
          )
          echo "matrix={\"directory\":$dirs}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate — ${{ matrix.directory }}
    runs-on: ubuntu-latest
    # D-11: Every non-sanitise job must gate on sanitise.
    needs: [sanitise, discover]
    # D-12: fail-fast false — all directories report every run.
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.15.5"

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
        with:
          tflint_version: "v0.63.1"

      # CI-01: fmt check
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.directory }}

      # CI-02: validate via init -backend=false (never plan/apply)
      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ${{ matrix.directory }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ matrix.directory }}

      # CI-03: tflint with azurerm ruleset
      # CR-02: tflint does NOT traverse parent directories for config, so with
      # working-directory set to the matrix dir the repo-root .tflint.hcl (and
      # the pinned azurerm ruleset it declares) would silently never load.
      # TFLINT_CONFIG_FILE points both steps at the root config explicitly.
      - name: tflint init
        run: tflint --init
        working-directory: ${{ matrix.directory }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TFLINT_CONFIG_FILE: ${{ github.workspace }}/.tflint.hcl

      - name: tflint
        run: tflint
        working-directory: ${{ matrix.directory }}
        env:
          TFLINT_CONFIG_FILE: ${{ github.workspace }}/.tflint.hcl

      # CI-04: checkov — soft_fail: false means build fails on policy violations.
      # output_format: cli avoids SARIF-upload write permission under the read-only token.
      # CR-01 (phase 2 review): the previous pin (v12.1347.0) resolved to checkov 2.0.930
      # (March 2022), which evaluated only 4 key-vault checks — CKV_AZURE_189 and
      # CKV2_AZURE_32 did not exist in that version, so the hardening gate was never
      # enforced in CI. v12.3107.0 runs checkov 3.x.
      - name: checkov
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff  # v12.3107.0
        with:
          directory: ${{ matrix.directory }}
          framework: terraform
          soft_fail: false
          output_format: cli
          # CKV2_AZURE_32: private endpoint creation is caller-side infrastructure and
          # cannot be satisfied inside a reusable module. Command-level skip mirrors
          # tests/test_key_vault_module.sh (assertion 11a); zero inline #checkov:skip
          # annotations exist in .tf files (SEC-05).
          # --- storage-account module (modules/storage-account + examples/storage-account) ---
          # The IDs below are storage-resource checks; they cannot weaken key-vault enforcement.
          # All IDs mirror tests/test_storage_account_module.sh --skip-check list verbatim (CR-01).
          # CKV_AZURE_35:   public_network_access_enabled defaults true — deliberate D-07 divergence
          #                 (remote-state accounts must be reachable by CI/dev machines; README documents)
          # CKV_AZURE_59:   same D-07 rationale — default-reachable storage, firewall is caller's choice
          # CKV_AZURE_206:  LRS is the cost-aware default per D-02; callers opt up via validated enum
          # CKV2_AZURE_1:   CMK (customer-managed key) is caller-side composition, not module responsibility
          # CKV2_AZURE_33:  private endpoint is caller-side infrastructure (mirrors key-vault CKV2_AZURE_32)
          # CKV2_AZURE_40:  shared-key auth is the remote-state consumption path; variable lets callers disable
          # CKV2_AZURE_41:  SAS expiration policy — module issues no SAS tokens
          # CKV2_AZURE_21:  blob logging — diagnostic settings are caller-side monitoring composition
          # CKV_AZURE_33:   queue logging — module manages blob workloads only; check did not fire empirically
          # CKV_AZURE_36:   trusted Microsoft services bypass — fires spuriously when network_rules=null
          #                 (no block rendered); when caller supplies network_rules, bypass defaults to AzureServices
          skip_check: CKV2_AZURE_32,CKV_AZURE_35,CKV_AZURE_59,CKV_AZURE_206,CKV2_AZURE_1,CKV2_AZURE_33,CKV2_AZURE_40,CKV2_AZURE_41,CKV2_AZURE_21,CKV_AZURE_33,CKV_AZURE_36
